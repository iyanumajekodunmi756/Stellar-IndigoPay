# k8s/secret.example.yaml
#
# Template for the cluster Secret. Copy to k8s/secret.yaml and fill in
# the real values before applying. k8s/secret.yaml is gitignored so
# committed credentials never land in the repo.
#
# Generate a metrics token with:
#   openssl rand -hex 32
# Generate a postgres password with:
#   openssl rand -base64 24
#
# Why split: the previous `k8s/secret.yaml` was committed with
# placeholder `changeme` values. The CI lint workflow in
# `.github/workflows/secrets-lint.yml` would have flagged it; this
# template is the supported way to opt in to that check.
apiVersion: v1
kind: Secret
metadata:
  name: indigopay-secrets
  namespace: indigopay
type: Opaque
stringData:
  POSTGRES_USER: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "indigopay"
  DATABASE_URL: "postgres://REPLACE_ME:REPLACE_ME@postgres-svc:5432/indigopay"
  RESEND_API_KEY: ""
  ADMIN_API_KEY: ""
  METRICS_BEARER_TOKEN: "REPLACE_ME"
