# k8s/hpa-frontend.yaml
#
# HorizontalPodAutoscaler for the frontend (Next.js) Deployment.
# Scales on CPU and memory utilization; the front tier is read-heavy
# with the backend doing all CPU-bound work, so the targets can be a
# touch more aggressive than the backend.
#
# Note: the front tier runs as a stateless Node SSR server. For
# static assets, scale through CDN cache-hit ratio, not pod count.

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
  namespace: indigopay
  labels:
    app: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max
